{% include "header.html" %}

<h1 class="page-title">Tags</h1>

{% if all_tags %}
<div class="tag-cloud-large">
{% for t in all_tags %}
<a href="{{ site_url }}/archives/tag_{{ t.slug }}.html" class="tag-item">{{ t.name }} <span class="tag-count">{{ t.count }}</span></a>
{% endfor %}
</div>
{% else %}
<p class="empty">No tags yet.</p>
{% endif %}
