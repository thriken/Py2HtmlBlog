<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>{{ page_title }}{% if page_title and site_name %} - {% endif %}{{ site_name }}</title>
	<link rel="alternate" type="application/rss+xml" title="RSS 2.0 - all posts" href="{{ site_url }}/rss.xml" />
	<!-- Font Awesome 6 -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
	<!-- style START -->
	<style type="text/css" media="screen">@import url( {{ site_url }}/css/style.css );</style>
	<!-- style END -->
</head>
<body>
<!-- wrap START -->
<div id="wrap">
<!-- container START -->
<div id="container">
<!-- header START -->
<div id="header">
	<div id="caption">
		<h1 id="title"><a href="{{ site_url }}/index.html">{{ site_name }}</a></h1>
		<div id="tagline">{{ tagline }}</div>
	</div>
	<!-- navigation START -->
	<div id="navigation">
		<ul id="menus">
			<li class="current_page_item"><a href="{{ site_url }}/index.html"><i class="fa fa-home"></i> Home</a></li>
			<li class="page_item"><a href="{{ site_url }}/archives.html"><i class="fa fa-info-circle"></i> About</a></li>
		</ul>
		<div class="fixed"></div>
	</div>
	<!-- navigation END -->
	<div class="fixed"></div>
</div>
<!-- header END -->
<!-- content START -->
<div id="content">
